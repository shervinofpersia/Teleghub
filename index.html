<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آرشیو کانال‌های تلگرام با تصاویر و فایل‌ها</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            color: #e0e0e0;
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 {
            color: #2AABEE;
            border-right: 4px solid #2AABEE;
            padding-right: 15px;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .post {
            background: #1a1d24;
            border-radius: 20px;
            margin-bottom: 30px;
            padding: 20px;
            transition: 0.2s;
            border: 1px solid #2a2e38;
        }
        .post:hover { border-color: #2AABEE; }
        .post-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .channel {
            background: #2AABEE20;
            color: #2AABEE;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .datetime {
            color: #888;
            font-size: 0.75rem;
        }
        .text {
            background: #0f1117;
            padding: 15px;
            border-radius: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 15px 0;
            font-size: 0.9rem;
            border-right: 3px solid #2AABEE;
        }
        .images {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
        }
        .images img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.2s;
        }
        .images img:hover { transform: scale(1.02); }
        .files {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .file-link {
            background: #2AABEE10;
            border: 1px solid #2AABEE;
            color: #2AABEE;
            padding: 6px 14px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .file-link:hover {
            background: #2AABEE;
            color: #000;
        }
        .slipnet-url {
            background: #0a0c10;
            padding: 8px 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .copy-btn {
            background: #2AABEE20;
            border: none;
            color: #2AABEE;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #2AABEE;
            color: #000;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2AABEE;
            color: #000;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 999;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 0.7rem;
        }
        hr { border-color: #2a2e38; margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 آخرین پست‌های کانال‌های تلگرام</h1>

    <div id="toast" class="toast">✅ کپی شد!</div>
    <footer>آخرین به‌روزرسانی: 2026-07-13 23:28:22 | تصاویر به صورت محلی در مخزن ذخیره شده‌اند.</footer>
</div>
<script>
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            let toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 1500);
        }).catch(() => {
            alert('کپی دستی: ' + text);
        });
    }
</script>
</body>
</html>
